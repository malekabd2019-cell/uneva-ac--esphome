name: Build ESPHome Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: esphome/esphome:latest # استخدام بيئة رسمية معزولة ومجهزة للتجميع
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile ESPHome Firmware
        run: |
          esphome compile uneva_ac.yaml

      - name: Upload Firmware Binary
        uses: actions/upload-artifact@v4
        with:
          name: uneva-ac-firmware
          path: .esphome/build/uneva-ac-controller/.pioenvs/uneva-ac-controller/firmware.bin
