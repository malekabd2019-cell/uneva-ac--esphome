name: Build ESPHome Firmware

on:
  workflow_dispatch: # لتشغيل التجميع يدوياً بضغطة زر

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install ESPHome
        run: |
          pip install esphome

      - name: Compile ESPHome Firmware
        run: |
          esphome compile uneva_ac.yaml

      - name: Upload Firmware Binary
        uses: actions/upload-artifact@v4
        with:
          name: uneva-ac-firmware
          path: .esphome/build/uneva-ac-controller/.pioenvs/uneva-ac-controller/firmware.bin
