name: Compile ESPHome

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build ESPHome Firmware
        uses: esphome/build-action@v2
        id: esphome-build
        with:
          yaml_file: TCL-Conditioner.yaml

      - name: Extract and Rename Firmware
        run: |
          mkdir -p output
          find . -name "firmware.bin" -exec cp {} output/tclac_firmware.bin \; 2>/dev/null || true
          find . -name "tclac.bin" -exec cp {} output/tclac_firmware.bin \; 2>/dev/null || true

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: tclac_firmware
          path: output/tclac_firmware.bin
          
