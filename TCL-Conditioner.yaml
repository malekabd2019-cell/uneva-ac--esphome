esp32:
  board: esp32dev
  framework:
    type: arduino

web_server:
  port: 80

uart:
  id: tcl_uart

# متغير عالمي لحفظ وضع المولد الحالي لكي لا يمسحه المكيف
globals:
  - id: active_gen_mode
    type: uint8_t
    restore_value: yes
    initial_value: '0'

select:
  - platform: template
    name: "وضع المولد (Gen Mode)"
    id: gen_mode_selector
    icon: "mdi:generator-portable"
    entity_category: config
    options:
      - "إيقاف (Off)"
      - "المستوى 1 (L1 - 2A)"
      - "المستوى 2 (L2 - 4A)"
      - "المستوى 3 (L3 - 5A)"
    optimistic: true
    set_action:
      then:
        - lambda: |-
            uint8_t gen_val = 0x00;
            if (x == "إيقاف (Off)") {
              gen_val = 0x00;
              id(active_gen_mode) = 0x00;
              ESP_LOGI("GEN_MODE", "تم تعيين: إيقاف المولد");
            } else if (x == "المستوى 1 (L1 - 2A)") {
              gen_val = 0x01;
              id(active_gen_mode) = 0x01;
              ESP_LOGI("GEN_MODE", "تم تعيين: المستوى 1 (2A)");
            } else if (x == "المستوى 2 (L2 - 4A)") {
              gen_val = 0x02;
              id(active_gen_mode) = 0x02;
              ESP_LOGI("GEN_MODE", "تم تعيين: المستوى 2 (4A)");
            } else if (x == "المستوى 3 (L3 - 5A)") {
              gen_val = 0x03;
              id(active_gen_mode) = 0x03;
              ESP_LOGI("GEN_MODE", "تم تعيين: المستوى 3 (5A)");
            }

            // بناء الحزمة المدمجة مع القيمة المحفوظة والحرارة الحالية
            uint8_t current_temp = (uint8_t)id(${device_name}climate).target_temperature;
            uint8_t cmd[38] = {
              0xBB, 0x00, 0x01, 0x03, 0x20, 0x03, 0x01, 0x64, 
              0x03, 0x08, 0x00, 0x00, 0x00, 0x01, 0x00, 0x00, 
              0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 
              0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 
              0x0D, current_temp, gen_val, 0x00, 0x00, 0x00
            };

            // حساب الـ Checksum وتثبيته
            uint8_t sum = 0;
            for (int i = 0; i < 37; i++) {
              sum += cmd[i];
            }
            cmd[37] = 0x62 - sum;

            id(tcl_uart).write_array(cmd, 38);
            
