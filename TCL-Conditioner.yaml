  ota_pass: 90cf525a594c8bb2cbf917bc2c2fa058
  api_key: lmUoWsWs1oqSfJqLFsA6PisHSx4Y1G+iu7V3PDIqpXk=
  uart_rx: GPIO16
  uart_tx: GPIO17

esphome:
  name: ${device_name}
  friendly_name: ${humanly_name}
  
  # ==========================================
  # الاستماع الدائم للبيانات المرتجعة من الريموت/المكيف
  # ==========================================
  on_loop:
    then:
      - lambda: |-
          static uint8_t rx_buf[38];
          static uint8_t rx_idx = 0;

          while (id(tcl_uart)->available()) {
            uint8_t b;
            id(tcl_uart)->read_byte(&b);

            // التزامن مع بداية حزمة البيانات (0xBB)
            if (rx_idx == 0 && b != 0xBB) {
              continue;
            }

            rx_buf[rx_idx++] = b;

            // عند اكتمال استلام 38 بايت
            if (rx_idx == 38) {
              // حساب الـ Checksum للتحقق من صحة الحزمة
              uint8_t crc = 0;
              for (int i = 0; i < 37; i++) {
                crc ^= rx_buf[i];
              }

              // إذا كانت الحزمة سليمة ومقبولة
              if (crc == rx_buf[37]) {
                bool power = (rx_buf[7] != 0x04);
                bool eco = (rx_buf[7] == 0xE4);
                uint8_t temp = 31 - rx_buf[9];
                uint8_t gen = rx_buf[18];

                if (temp < 16) temp = 16;
                if (temp > 30) temp = 30;

                // 1. تحديث المتغيرات العامة
                id(ac_power_on) = power;
                id(eco_active_val) = eco;
                id(ac_temp_val) = temp;
                id(ac_gen_val) = gen;

                // 2. تحديث واجهة المناخ (Climate) في Home Assistant
                if (power) {
                  id(uneva_climate).mode = climate::CLIMATE_MODE_COOL;
                } else {
                  id(uneva_climate).mode = climate::CLIMATE_MODE_OFF;
                }
                id(uneva_climate).target_temperature = temp;
                id(uneva_climate).publish_state();

                // 3. تحديث قائمة وضع المولد (Select)
                if (gen == 0) id(gen_select).publish_state("OFF");
                else if (gen == 1) id(gen_select).publish_state("L1");
                else if (gen == 2) id(gen_select).publish_state("L2");
                else if (gen == 3) id(gen_select).publish_state("L3");

                // 4. تحديث مفتاح وضع التوفير (Switch)
                id(eco_switch).publish_state(eco);
              }

              rx_idx = 0; // إعادة ضبط المؤشر لاستقبال الحزمة التالية
            }
          }

esp32:
  board: esp32dev
  framework:
    type: arduino

# ==========================================
# الاتصال بالشبكة والخدمات
# ==========================================
wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}

api:
  encryption:
    key: ${api_key}

ota:
  - platform: esphome
    password: ${ota_pass}

web_server:
  port: 80

uart:
  id: tcl_uart
  tx_pin: ${uart_tx}
  rx_pin: ${uart_rx}
  baud_rate: 9600
  data_bits: 8
  parity: EVEN
  stop_bits: 1

# ==========================================
# 1. متغيرات النظام
# ==========================================
globals:
  - id: ac_power_on
    type: bool
    restore_value: no
    initial_value: 'true'

  - id: ac_temp_val
    type: uint8_t
    restore_value: no
    initial_value: '20'

  - id: ac_gen_val
    type: uint8_t
    restore_value: no
    initial_value: '0'

  - id: eco_active_val
    type: bool
    restore_value: no
    initial_value: 'false'

# ==========================================
# 2. سكربت إرسال أمر UART الموحد للمكيف
# ==========================================
script:
  - id: send_ac_command
    then:
      - lambda: |-
          uint8_t dataTX[38] = {0};

          dataTX[0] = 0xBB;
          dataTX[1] = 0x00;
          dataTX[2] = 0x01;
          dataTX[3] = 0x03;
          dataTX[4] = 0x20;
          dataTX[5] = 0x03;
          dataTX[6] = 0x01;
          
          if (!id(ac_power_on)) {
            dataTX[7] = 0x04;
          } else {
            dataTX[7] = id(eco_active_val) ? 0xE4 : 0x64;
          }
          
          dataTX[8] = 0x03; // Cool Mode
          
          if (id(eco_active_val) && id(ac_power_on)) {
            dataTX[9] = 31 - 26;
          } else {
            dataTX[9] = 31 - id(ac_temp_val);
          }
          
          dataTX[10] = 0x00;
          dataTX[13] = 0x01;
          dataTX[18] = id(ac_gen_val);

          uint8_t crc = 0;
          for (int i = 0; i < 37; i++) {
            crc ^= dataTX[i];
          }
          dataTX[37] = crc;

          id(tcl_uart)->write_array(dataTX, 38);
          id(tcl_uart)->flush();

# ==========================================
# 3. واجهة المناخ الموحدة (Climate Entity)
# ==========================================
climate:
  - platform: template
    name: "${humanly_name}"
    id: uneva_climate
    modes:
      - "OFF"
      - "COOL"
    visual:
      min_temperature: 16
      max_temperature: 30
      temperature_step: 1
    control_action:
      then:
        - lambda: |-
            if (x.get_mode().has_value()) {
              auto mode = *x.get_mode();
              if (mode == climate::CLIMATE_MODE_OFF) {
                id(ac_power_on) = false;
              } else if (mode == climate::CLIMATE_MODE_COOL) {
                id(ac_power_on) = true;
              }
              id(uneva_climate).mode = mode;
            }
            if (x.get_target_temperature().has_value()) {
              float temp = *x.get_target_temperature();
              id(ac_temp_val) = (uint8_t)temp;
              id(uneva_climate).target_temperature = temp;
            }
            id(uneva_climate).publish_state();
        - script.execute: send_ac_command

# ==========================================
# 4. خيارات وضع المولد و ECO
# ==========================================
select:
  - platform: template
    name: "Generator Mode (GEN)"
    id: gen_select
    optimistic: true
    options:
      - "OFF"
      - "L1"
      - "L2"
      - "L3"
    set_action:
      then:
        - lambda: |-
            if (x == "OFF") id(ac_gen_val) = 0;
            else if (x == "L1") id(ac_gen_val) = 1;
            else if (x == "L2") id(ac_gen_val) = 2;
            else if (x == "L3") id(ac_gen_val) = 3;
        - script.execute: send_ac_command

switch:
  - platform: template
    name: "ECO Mode"
    id: eco_switch
    optimistic: true
    turn_on_action:
      then:
        - lambda: 'id(eco_active_val) = true;'
        - script.execute: send_ac_command
    turn_off_action:
      then:
        - lambda: 'id(eco_active_val) = false;'
        - script.execute: send_ac_command
        
