substitutions:
  device_name: tclac
  humanly_name: TCL Air Conditioner
  wifi_ssid: "TOTOLINK ND300"
  wifi_password: "A777763945A"
  recovery_pass: mKSzmBdt7DAj
  ota_pass: 90cf525a594c8bb2cbf917bc2c2fa058
  api_key: lmUoWsWs1oqSfJqLFsA6PisHSx4Y1G+iu7V3PDIqpXk=
  uart_rx: GPIO3
  uart_tx: GPIO1
  receive_led: GPIO6
  transmit_led: GPIO4

esphome:
  name: ${device_name}
  friendly_name: ${humanly_name}

esp8266:
  board: esp01_1m

# 1. التحديث اللاسلكي (OTA)
ota:
  - platform: esphome
    password: ${ota_pass}

# 2. جلب الحزمة الأساسية الصحيحة فقط من المستودع
packages:
  remote_package:
    url: https://github.com/sorz2122/tclac.git
    ref: master
    files:
      - packages/core.yaml
    refresh: 30s

# 3. وضع المولد (Generator Mode)
select:
  - platform: template
    name: "وضع المولد (Generator)"
    id: generator_mode_select
    icon: "mdi:generator-portable"
    options:
      - "Off"
      - "Level 1"
      - "Level 2"
      - "Level 3"
    initial_option: "Off"
    optimistic: true
    set_action:
      - logger.log: "تم تغيير مستوى المولد"

# 4. مفتاح الوضع الصحي (Health Mode)
switch:
  - platform: template
    name: "الوضع الصحي (Health)"
    id: health_switch
    icon: "mdi:leaf"
    optimistic: true
    turn_on_action:
      - logger.log: "تفعيل الوضع الصحي"
    turn_off_action:
      - logger.log: "إيقاف الوضع الصحي"
      
