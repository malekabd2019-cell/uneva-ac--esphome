esphome:
  name: ${device_name}
  friendly_name: ${humanly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

web_server:
  port: 80

uart:
  id: tcl_uart
  tx_pin: ${uart_tx}
  rx_pin: ${uart_rx}
  baud_rate: 9600

# ==========================================
# 1. متغيرات النظام المحفوظة
# ==========================================
globals:
  - id: ac_mode_val
    type: uint8_t
    initial_value: '0x03' # تبريد افتراضي

  - id: ac_temp_val
    type: uint8_t
    initial_value: '24' # 24 درجة افتراضي

  - id: ac_gen_val
    type: uint8_t
    initial_value: '0x00' # إيقاف المولد افتراضي

# ==========================================
# 2. سكربت إرسال أمر UART الموحد للمكيف
# ==========================================
script:
  - id: send_tcl_command
    then:
      - lambda: |-
          uint8_t cmd[38] = {
            0xBB, 0x00, 0x01, 0x03, 0x20, 0x03, 0x01, 0x64,
            0x03, id(ac_mode_val), 0x00, 0x00, 0x00, 0x01, 0x00, 0x00,
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
            0x0D, id(ac_temp_val), id(ac_gen_val), 0x00, 0x00, 0x00
          };

          // حساب Checksum لبروتوكول TCL من البايت 3 إلى 36
          uint8_t sum = 0;
          for (int i = 3; i < 37; i++) {
            sum += cmd[i];
          }
          cmd[37] = sum;

          // إرسال الحزمة للمكيف
          id(tcl_uart).write_array(cmd, 38);

# ==========================================
# 3. القوائم المباشرة للتحكم (Select & Number)
# ==========================================
select:
  # وضع المكيف الرئيسي
  - platform: template
    name: "وضع المكيف (AC Mode)"
    id: ac_mode_selector
    icon: "mdi:air-conditioner"
    options:
      - "تبريد (Cool)"
      - "إيقاف (Off)"
      - "تدفئة (Heat)"
      - "مروحة (Fan)"
      - "تجفيف (Dry)"
    initial_option: "تبريد (Cool)"
    optimistic: true
    set_action:
      then:
        - lambda: |-
            if (x == "إيقاف (Off)") {
              id(ac_mode_val) = 0x00;
            } else if (x == "تبريد (Cool)") {
              id(ac_mode_val) = 0x03;
            } else if (x == "تدفئة (Heat)") {
              id(ac_mode_val) = 0x01;
            } else if (x == "مروحة (Fan)") {
              id(ac_mode_val) = 0x07;
            } else if (x == "تجفيف (Dry)") {
              id(ac_mode_val) = 0x02;
            }
        - script.execute: send_tcl_command

  # وضع المولد
  - platform: template
    name: "وضع المولد (Gen Mode)"
    id: gen_mode_selector
    icon: "mdi:generator-portable"
    entity_category: config
    options:
      - "إيقاف (Off)"
      - "المستوى 1 (L1 - 2A)"
      - "المستوى 2 (L2 - 4A)"
      - "المستوى 3 (L3 - 5A)"
    initial_option: "إيقاف (Off)"
    optimistic: true
    set_action:
      then:
        - lambda: |-
            if (x == "إيقاف (Off)") {
              id(ac_gen_val) = 0x00;
            } else if (x == "المستوى 1 (L1 - 2A)") {
              id(ac_gen_val) = 0x43;
            } else if (x == "المستوى 2 (L2 - 4A)") {
              id(ac_gen_val) = 0x49;
            } else if (x == "المستوى 3 (L3 - 5A)") {
              id(ac_gen_val) = 0x4D;
            }
        - script.execute: send_tcl_command

# درجة الحرارة (16 - 31)
number:
  - platform: template
    name: "درجة الحرارة (Temperature)"
    id: ac_temp_number
    icon: "mdi:thermometer"
    min_value: 16
    max_value: 31
    step: 1
    initial_value: 24
    optimistic: true
    set_action:
      then:
        - lambda: |-
            id(ac_temp_val) = (uint8_t)x;
        - script.execute: send_tcl_command

# ==========================================
# 4. إعادة إرسال الحالة كل 10 ثوانٍ لثبات الأمر
# ==========================================
interval:
  - interval: 10s
    then:
      - script.execute: send_tcl_command
      
