  # UART and LED Pins
  uart_rx: GPIO16
  uart_tx: GPIO17
  receive_led: GPIO6
  transmit_led: GPIO4

# ملفات المستودع الخارجي
packages:
  remote_package:
    url: https://github.com/I-am-nightingale/tclac.git
    ref: master
    files:
      - packages/core.yaml
    refresh: 0s

# مواصفات المتحكم
esp32:
  board: esp32dev
  framework:
    type: arduino

# واجهة الويب للتحديث اللاسلكي
web_server:
  port: 80

# ==========================================
# تفعيل مراقب الأسلاك لطباعة شفرات الـ Hex الحية
# ==========================================
uart:
  debug:
    direction: BOTH

# ==========================================
# إضافة قائمة اختيار وضع المولد (Gen Mode) بالأمبير المحدود
# ==========================================
select:
  - platform: template
    name: "وضع المولد (Gen Mode)"
    id: gen_mode_selector
    icon: "mdi:generator-portable"
    options:
      - "إيقاف (Off)"
      - "المستوى 1 (L1 - 2A)"
      - "المستوى 2 (L2 - 4A)"
      - "المستوى 3 (L3 - 5A)"
    optimistic: true
    set_action:
      then:
        - lambda: |-
            if (x == "إيقاف (Off)") {
              ESP_LOGI("GEN_MODE", "تم اختيار الوضع: Off (0)");
            } else if (x == "المستوى 1 (L1 - 2A)") {
              ESP_LOGI("GEN_MODE", "تم اختيار الوضع: L1 (2A)");
            } else if (x == "المستوى 2 (L2 - 4A)") {
              ESP_LOGI("GEN_MODE", "تم اختيار الوضع: L2 (4A)");
            } else if (x == "المستوى 3 (L3 - 5A)") {
              ESP_LOGI("GEN_MODE", "تم اختيار الوضع: L3 (5A)");
            }
            
