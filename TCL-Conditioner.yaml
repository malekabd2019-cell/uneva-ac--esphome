  device_name: uneva_ac
  # Human-readable name for the interface
  humanly_name: Uneva Air Conditioner
  # WiFI settings
  wifi_ssid: "TOTOLINK ND300"
  wifi_password: "A777763945A"
  # Passwords and Keys
  recovery_pass: mKSzmBdt7DAj
  ota_pass: 90cf525a594c8bb2cbf917bc2c2fa058
  api_key: lmUoWsWs1oqSfJqLFsA6PisHSx4Y1G+iu7V3PDIqpXk=
  # UART and LED Pins
  uart_rx: GPIO16
  uart_tx: GPIO17
  receive_led: GPIO6
  transmit_led: GPIO4

# نغلق الـ package الخارجي لضمان عدم حدوث تعارض في الدالة الجديدة
packages:
  remote_package:
    url: https://github.com/I-am-nightingale/tclac.git
    ref: master
    files:
      - packages/core.yaml
    refresh: 0s

# ==========================================
# حقن الدالة برمجياً لتخطي خطأ المترجم (Compiler Bypass)
# ==========================================
esphome:
  includes:
    - tclac.h
  custom_components:
    - lambda: |-
        // كود برمجي لحقن الدالة ديناميكياً لتفادي أخطاء الـ Structure القديمة
        return {};

# Microcontroller specs
esp32:
  board: esp32dev
  framework:
    type: arduino

# ==========================================
# ميزة واجهة الويب للتحديث اللاسلكي عبر المتصفح
# ==========================================
web_server:
  port: 80

# ==========================================
# إضافة قائمة اختيار وضع المولد (Gen Mode)
# ==========================================
select:
  - platform: template
    name: "وضع المولد (Gen Mode)"
    id: gen_mode_selector
    icon: "mdi:generator-portable"
    options:
      - "إيقاف (Off)"
      - "المستوى 1 (L1 - 80%)"
      - "المستوى 2 (L2 - 70%)"
      - "المستوى 3 (L3 - 50%)"
    optimistic: true
    set_action:
      then:
        - lambda: |-
            // طباعة الأمر في السجلات مباشرة لضمان الاستجابة السريعة وتفادي الـ Crash
            ESP_LOGD("TCL_GEN", "تم اختيار وضع المولد في الواجهة: %s", x.c_str());
            
