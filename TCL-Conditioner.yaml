# ملف إعدادات ESPHome لمكيف UNEVA المحدث بالكامل
esphome:
  name: uneva-ac
  friendly_name: Uneva Air Conditioner

# --- تحديد الفرع الرئيسي (ref: main) لحل مشكلة التحميل نهائياً ---
external_components:
  - source:
      type: git
      url: https://github.com/Scorpiof/esphome-tcl_ac
      ref: main

esp32:
  board: esp32dev
  framework:
    type: arduino

# 1. تفعيل واجهة الويب للتحديث اللاسلكي (OTA) عبر المتصفح مباشرة
web_server:
  port: 80

# إعدادات الاتصال بالواي فاي الخاصة بك
wifi:
  ssid: "TOTOLINK ND300"
  password: "A777763945A"
  
  # تعيين آيبي ثابت للوصول السريع لصفحة التحديث اللاسلكي
  manual_ip:
    static_ip: 192.168.1.116
    gateway: 192.168.1.1
    subnet: 255.255.255.0

# تمكين التحديث اللاسلكي والـ API للربط مع Home Assistant
api:
ota:
  - platform: esphome

# 2. ضبط منافذ الـ UART للتواصل مع لوحة المكيف الإلكترونية
uart:
  tx_pin: GPIO17 # سلك الإرسال المتصل بـ RX في المكيف
  rx_pin: GPIO16 # سلك الاستقبال المتصل بـ TX في المكيف
  baud_rate: 9600

# 3. تعريف مكيف UNEVA كجهاز مناخ (Climate)
climate:
  - platform: tcl_ac
    name: "uneva_ac Climate"

# 4. إضافة ميزة وضع المولد (Generator Mode) لتقليل سحب الأمبير
select:
  - platform: tcl_ac
    gen_mode:
      name: "Generator Mode"

# 5. إضافة زر إعادة تشغيل الـ ESP32 عن بُعد لسهولة الصيانة
button:
  - platform: restart
    name: "Restart AC ESP32"
    icon: "mdi:restart"
    
