substitutions:
  device_name: tclac
  humanly_name: TCL Air Conditioner
  wifi_ssid: "TOTOLINK ND300"
  wifi_password: "A777763945A"
  recovery_pass: mKSzmBdt7DAj
  ota_pass: 90cf525a594c8bb2cbf917bc2c2fa058
  api_key: lmUoWsWs1oqSfJqLFsA6PisHSx4Y1G+iu7V3PDIqpXk=
  uart_rx: GPIO16
  uart_tx: GPIO17
  receive_led: GPIO6
  transmit_led: GPIO4

esphome:
  name: ${device_name}
  friendly_name: ${humanly_name}
  # مراقب أذكى داخل الـ lambda يمنع تكرار الصوت ويمنع أخطاء التجميع
  on_boot:
    priority: -100
    then:
      - lambda: |-
          if (!App.get_climates().empty()) {
            App.get_climates()[0]->add_on_state_callback([](auto &) {
              static float last_target_temp = -1.0;
              static uint8_t last_mode = 255;
              static uint8_t last_fan = 255;

              auto *ac = App.get_climates()[0];
              if (std::isnan(ac->target_temperature)) return;

              float current_temp = ac->target_temperature;
              uint8_t current_mode = (uint8_t) ac->mode;
              uint8_t current_fan = ac->fan_mode.has_value() ? (uint8_t) ac->fan_mode.value() : 0;

              // القراءة الأولى عند إقلاع ESP32
              if (last_target_temp == -1.0) {
                last_target_temp = current_temp;
                last_mode = current_mode;
                last_fan = current_fan;
                return;
              }

              // يتم تنفيذ الإرسال فقط إذا غير المستخدم الحرارة أو الوضع فعلياً وكان وضع المولد مفعلاً
              if ((current_temp != last_target_temp || current_mode != last_mode || current_fan != last_fan)) {
                last_target_temp = current_temp;
                last_mode = current_mode;
                last_fan = current_fan;

                std::string genState = id(generator_mode_select).state;
                if (genState != "Off") {
                  id(generator_mode_select).make_call().set_option(genState).perform();
                }
              }
            });
          }

esp32:
  board: esp32dev
  framework:
    type: arduino

# 1. إعداد السيريال للمكيف
uart:
  id: uart_bus
  rx_pin: ${uart_rx}
  tx_pin: ${uart_tx}
  baud_rate: 9600

# 2. التحديث اللاسلكي وخادم الويب المباشر
ota:
  - platform: esphome
    password: ${ota_pass}

web_server:
  port: 80

# 3. مكون مزامنة الوقت
time:
  - platform: homeassistant
    id: homeassistant_time

# 4. الحزمة الأساسية للمكيف
packages:
  remote_package:
    url: https://github.com/sorz2122/tclac.git
    ref: master
    files:
      - packages/core.yaml
    refresh: 30s

# 5. الحساسات التقديرية (فولت، واط، أمبير، استهلاك اليوم)
sensor:
  - platform: template
    name: "فولتية الكهرباء (تقديري)"
    id: ac_voltage
    unit_of_measurement: "V"
    icon: "mdi:flash-outline"
    accuracy_decimals: 0
    lambda: |-
      return 220.0;

  - platform: template
    name: "قدرة المكيف (تقديري)"
    id: ac_power
    unit_of_measurement: "W"
    icon: "mdi:gauge"
    accuracy_decimals: 0
    update_interval: 1s
    lambda: |-
      if (!App.get_climates().empty()) {
        auto *ac = App.get_climates()[0];
        if (ac->mode == climate::CLIMATE_MODE_OFF) {
          return 5.0; 
        }
      } else {
        return 0.0;
      }

      std::string genState = id(generator_mode_select).state;
      if (genState == "Level 1") return 700.0;
      if (genState == "Level 2") return 1100.0;
      if (genState == "Level 3") return 1400.0;
      
      return 1800.0;

  - platform: template
    name: "أمبير المكيف (تقديري)"
    id: ac_current
    unit_of_measurement: "A"
    icon: "mdi:current-ac"
    accuracy_decimals: 1
    update_interval: 1s
    lambda: |-
      if (id(ac_voltage).state > 0) {
        return id(ac_power).state / id(ac_voltage).state;
      }
      return 0.0;

  - platform: total_daily_energy
    name: "استهلاك اليوم (تقديري)"
    id: ac_daily_energy
    power_id: ac_power
    icon: "mdi:calendar-today"
    filters:
      - multiply: 0.001
    unit_of_measurement: "kWh"

# 6. قائمة وضع المولد الديناميكية الشاملة
select:
  - platform: template
    name: "وضع المولد (Generator)"
    id: generator_mode_select
    icon: "mdi:generator-portable"
    options:
      - "Off"
      - "Level 1"
      - "Level 2"
      - "Level 3"
    initial_option: "Off"
    optimistic: true
    set_action:
      - lambda: |-
          uint8_t genLevel = 0;
          if (x == "Level 1") genLevel = 1;
          else if (x == "Level 2") genLevel = 2;
          else if (x == "Level 3") genLevel = 3;

          uint8_t currentTemp = 24;
          uint8_t acModeByte = 0x03; 
          uint8_t fanSpeedByte = 0x64; 

          if (!App.get_climates().empty()) {
            auto *ac = App.get_climates()[0];
            
            if (!std::isnan(ac->target_temperature)) {
              currentTemp = (uint8_t) ac->target_temperature;
            }

            switch (ac->mode) {
              case climate::CLIMATE_MODE_COOL:     acModeByte = 0x03; break;
              case climate::CLIMATE_MODE_HEAT:     acModeByte = 0x04; break;
              case climate::CLIMATE_MODE_DRY:      acModeByte = 0x02; break;
              case climate::CLIMATE_MODE_FAN_ONLY: acModeByte = 0x01; break;
              default: acModeByte = 0x03; break;
            }

            if (ac->fan_mode.has_value()) {
              switch (ac->fan_mode.value()) {
                case climate::CLIMATE_FAN_LOW:    fanSpeedByte = 0x20; break;
                case climate::CLIMATE_FAN_MEDIUM: fanSpeedByte = 0x40; break;
                case climate::CLIMATE_FAN_HIGH:   fanSpeedByte = 0x60; break;
                case climate::CLIMATE_FAN_AUTO:   fanSpeedByte = 0x64; break;
                default: fanSpeedByte = 0x64; break;
              }
            }
          }

          if (currentTemp < 16) currentTemp = 16;
          if (currentTemp > 30) currentTemp = 30;

          uint8_t dataTX[38] = {0};
          dataTX[0] = 0xBB;
          dataTX[1] = 0x00;
          dataTX[2] = 0x01;
          dataTX[3] = 0x03;
          dataTX[4] = 0x20;
          dataTX[5] = 0x03;
          dataTX[6] = 0x01;
          dataTX[7] = fanSpeedByte;   
          dataTX[8] = acModeByte;     
          dataTX[9] = 31 - currentTemp; 
          dataTX[10] = 0x00;
          dataTX[13] = 0x01;
          dataTX[18] = genLevel;      

          uint8_t crc = 0;
          for (int i = 0; i < 37; i++) {
            crc ^= dataTX[i];
          }
          dataTX[37] = crc;

          id(uart_bus).write_array(dataTX, 38);
          
