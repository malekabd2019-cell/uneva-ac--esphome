# ==========================================
# ميزة واجهة الويب للتحديث اللاسلكي عبر المتصفح
# ==========================================
web_server:
  port: 80

# ==========================================
# إضافة قائمة اختيار وضع المولد (Gen Mode)
# ==========================================
select:
  - platform: template
    name: "وضع المولد (Gen Mode)"
    id: gen_mode_selector
    icon: "mdi:generator-portable"
    options:
      - "إيقاف (Off)"
      - "المستوى 1 (L1 - 80%)"
      - "المستوى 2 (L2 - 70%)"
      - "المستوى 3 (L3 - 50%)"
    optimistic: true
    set_action:
      then:
        - lambda: |-
            // البحث عن كينونة التكييف المسجلة تلقائياً في النظام
            for (auto *climat : App.get_climates()) {
              // نقوم بالتحديث لجميع كينونات التكييف التابعة للمكون tclac
              auto *ac = (tclac::tclacClimate *) climat;
              
              if (x == "إيقاف (Off)") {
                ac->set_gen_mode(0);
              } else if (x == "المستوى 1 (L1 - 80%)") {
                ac->set_gen_mode(1);
              } else if (x == "المستوى 2 (L2 - 70%)") {
                ac->set_gen_mode(2);
              } else if (x == "المستوى 3 (L3 - 50%)") {
                ac->set_gen_mode(3);
              }
            }
            
