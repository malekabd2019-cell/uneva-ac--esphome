  board: esp32dev
  framework:
    type: arduino

# واجهة الويب للتحديث اللاسلكي
web_server:
  port: 80

# تفعيل مراقب الأسلاك
uart:
  id: tcl_uart
  debug:
    direction: BOTH

# ==========================================
# تجربة التحكم بوضع المولد مباشرة من الهاتف
# ==========================================
select:
  - platform: template
    name: "وضع المولد (Gen Mode)"
    id: gen_mode_selector
    icon: "mdi:generator-portable"
    options:
      - "إيقاف (Off)"
      - "المستوى 1 (L1 - 2A)"
      - "المستوى 2 (L2 - 4A)"
      - "المستوى 3 (L3 - 5A)"
    optimistic: true
    set_action:
      then:
        - lambda: |-
            // مصفوفة الأمر الأساسية المكونة من 38 بايت والتي أخذناها من الـ Logs
            uint8_t gen_cmd[38] = {
              0xBB, 0x00, 0x01, 0x03, 0x20, 0x03, 0x01, 0x64, 
              0x03, 0x08, 0x00, 0x00, 0x00, 0x01, 0x00, 0x00, 
              0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 
              0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 
              0x0D, 0x15, 0x00, 0x00, 0x00, 0x00
            };

            // حقن الشفرة المناسبة في الخانة رقم 35 وحساب الحماية تلقائياً
            if (x == "إيقاف (Off)") {
              gen_cmd[34] = 0x41; 
              ESP_LOGI("GEN_MODE", "إرسال أمر: إيقاف وضع المولد");
            } else if (x == "المستوى 1 (L1 - 2A)") {
              gen_cmd[34] = 0x43;
              ESP_LOGI("GEN_MODE", "إرسال أمر: المستوى 1 - 2 أمبير");
            } else if (x == "المستوى 2 (L2 - 4A)") {
              gen_cmd[34] = 0x49;
              ESP_LOGI("GEN_MODE", "إرسال أمر: المستوى 2 - 4 أمبير");
            } else if (x == "المستوى 3 (L3 - 5A)") {
              gen_cmd[34] = 0x4D;
              ESP_LOGI("GEN_MODE", "إرسال أمر: المستوى 3 - 5 أمبير");
            }

            // حساب الـ Checksum (البايت الأخير رقم 38) تلقائياً بناءً على قانون المكيف
            uint8_t sum = 0;
            for (int i = 0; i < 37; i++) {
              sum += gen_cmd[i];
            }
            gen_cmd[37] = 0x80 - sum; // المعادلة الرياضية الرياضية المستنتجة للحماية

            // إرسال الحزمة كاملة عبر السلك إلى المكيف
            id(tcl_uart).write_array(gen_cmd, 38);
            
