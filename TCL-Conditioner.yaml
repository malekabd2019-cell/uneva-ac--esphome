substitutions:
  device_name: uneva-ac
  humanly_name: Uneva Air Conditioner
  wifi_ssid: "TOTOLINK ND300"
  wifi_password: "A777763945A"
  recovery_pass: mKSzmBdt7DAj
  ota_pass: 90cf525a594c8bb2cbf917bc2c2fa058
  api_key: lmUoWsWs1oqSfJqLFsA6PisHSx4Y1G+iu7V3PDIqpXk=
  uart_rx: GPIO16
  uart_tx: GPIO17

esphome:
  name: ${device_name}
  friendly_name: ${humanly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}

api:
  encryption:
    key: ${api_key}

ota:
  - platform: esphome
    password: ${ota_pass}

web_server:
  port: 80

uart:
  id: tcl_uart
  tx_pin: ${uart_tx}
  rx_pin: ${uart_rx}
  baud_rate: 9600
  data_bits: 8
  parity: EVEN
  stop_bits: 1

globals:
  - id: ac_mode_val
    type: uint8_t
    restore_value: yes
    initial_value: '0x03'

  - id: ac_temp_val
    type: uint8_t
    restore_value: yes
    initial_value: '24'

  - id: ac_gen_val
    type: uint8_t
    restore_value: yes
    initial_value: '0x00'

  - id: eco_active_val
    type: bool
    restore_value: yes
    initial_value: 'false'

script:
  - id: send_ac_command
    then:
      - lambda: |-
          uint8_t dataTX[38] = {0};

          dataTX[0] = 0xBB;
          dataTX[1] = 0x00;
          dataTX[2] = 0x01;
          dataTX[3] = 0x03;
          dataTX[4] = 0x20;
          dataTX[5] = 0x03;
          dataTX[6] = 0x01;
          
          dataTX[7] = id(eco_active_val) ? 0xE4 : 0x64;
          dataTX[8] = id(ac_mode_val);
          
          if (id(eco_active_val)) {
            dataTX[9] = 31 - 26;
          } else {
            dataTX[9] = 31 - id(ac_temp_val);
          }
          
          dataTX[10] = 0x00;
          dataTX[13] = 0x01;
          dataTX[18] = id(ac_gen_val);

          uint8_t crc = 0;
          for (int i = 0; i < 37; i++) {
            crc ^= dataTX[i];
          }
          dataTX[37] = crc;

          id(tcl_uart)->write_array(dataTX, 38);
          id(tcl_uart)->flush();
          
          ESP_LOGD("uneva_ac", "AC Command Sent Successfully");

number:
  - platform: template
    name: "Temperature"
    min_value: 16
    max_value: 30
    step: 1
    optimistic: true
    set_action:
      - lambda: 'id(ac_temp_val) = x;'
      - script.execute: send_ac_command

select:
  - platform: template
    name: "Generator Mode (GEN)"
    optimistic: true
    options:
      - "OFF"
      - "L1"
      - "L2"
      - "L3"
    set_action:
      - lambda: |-
          if (x == "OFF") id(ac_gen_val) = 0x00;
          else if (x == "L1") id(ac_gen_val) = 0x01;
          else if (x == "L2") id(ac_gen_val) = 0x02;
          else if (x == "L3") id(ac_gen_val) = 0x03;
      - script.execute: send_ac_command

switch:
  - platform: template
    name: "ECO Mode"
    optimistic: true
    turn_on_action:
      - lambda: 'id(eco_active_val) = true;'
      - script.execute: send_ac_command
    turn_off_action:
      - lambda: 'id(eco_active_val) = false;'
      - script.execute: send_ac_command
      
