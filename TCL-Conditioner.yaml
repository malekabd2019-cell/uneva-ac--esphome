# ملف إعدادات تفعيل وضع المولد والتحديث اللاسلكي لمكيف UNEVA
esphome:
  name: uneva_ac
  friendly_name: Uneva Air Conditioner

# --- استدعاء نسخة الكود التي تدعم ميزة المولد (GEN Mode) ---
external_components:
  - source:
      type: git
      url: https://github.com/raalsaadi/esphome-tcl_ac
      ref: main

esp32:
  board: esp32dev
  framework:
    type: arduino

# 1. تفعيل واجهة الويب للتحديث اللاسلكي (OTA) عبر المتصفح
web_server:
  port: 80

# إعدادات الاتصال بشبكة الواي فاي الخاصة بك
wifi:
  ssid: "TOTOLINK ND300"
  password: "A777763945A"
  
  # تعيين آيبي ثابت للوصول السريع لصفحة التحديث اللاسلكي
  manual_ip:
    static_ip: 192.168.1.116
    gateway: 192.168.1.1
    subnet: 255.255.255.0

# تمكين التحديث اللاسلكي والـ API للربط مع Home Assistant
api:
ota:
  - platform: esphome

# 2. ضبط منافذ الـ UART للتواصل مع لوحة المكيف الإلكترونية
uart:
  tx_pin: GPIO17 # منفذ الإرسال TX الخاص بك
  rx_pin: GPIO16 # منفذ الاستقبال RX الخاص بك
  baud_rate: 9600

# 3. تعريف مكيف UNEVA كجهاز مناخ (Climate)
climate:
  - platform: tcl_ac
    name: "uneva_ac Climate"

# 4. إضافة ميزة وضع المولد (Generator Mode) لتقليل سحب الأمبير
select:
  - platform: tcl_ac
    gen_mode:
      name: "Generator Mode"
      
