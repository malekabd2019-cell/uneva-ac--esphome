substitutions:
  device_name: tclac
  humanly_name: TCL Air Conditioner
  wifi_ssid: "TOTOLINK ND300"
  wifi_password: "A777763945A"
  recovery_pass: mKSzmBdt7DAj
  ota_pass: 90cf525a594c8bb2cbf917bc2c2fa058
  api_key: lmUoWsWs1oqSfJqLFsA6PisHSx4Y1G+iu7V3PDIqpXk=
  uart_rx: GPIO16
  uart_tx: GPIO17
  receive_led: GPIO6
  transmit_led: GPIO4

esphome:
  name: ${device_name}
  friendly_name: ${humanly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

# 1. إعداد السيريال القياسي
uart:
  id: uart_bus
  rx_pin: ${uart_rx}
  tx_pin: ${uart_tx}
  baud_rate: 9600

# 2. التحديث اللاسلكي وخادم الويب المباشر
ota:
  - platform: esphome
    password: ${ota_pass}

web_server:
  port: 80

# 3. مكون مزامنة الوقت
time:
  - platform: homeassistant
    id: homeassistant_time

# 4. الحزمة الأساسية للمكيف
packages:
  remote_package:
    url: https://github.com/I-am-nightingale/tclac.git
    ref: master
    files:
      - packages/core.yaml
    refresh: 0s

# 5. الحساسات التقديرية (فولت، واط، أمبير، استهلاك اليوم)
sensor:
  - platform: template
    name: "فولتية الكهرباء (تقديري)"
    id: ac_voltage
    unit_of_measurement: "V"
    icon: "mdi:flash-outline"
    accuracy_decimals: 0
    lambda: |-
      return 220.0;

  - platform: template
    name: "قدرة المكيف (تقديري)"
    id: ac_power
    unit_of_measurement: "W"
    icon: "mdi:gauge"
    accuracy_decimals: 0
    update_interval: 1s
    lambda: |-
      if (!App.get_climates().empty()) {
        auto *ac = (esphome::tclac::TCLAC *) App.get_climates()[0];
        if (ac->mode == climate::CLIMATE_MODE_OFF) {
          return 5.0; 
        }
        
        uint8_t gen = ac->get_gen_mode();
        if (gen == 1) return 700.0;
        if (gen == 2) return 1100.0;
        if (gen == 3) return 1400.0;
        
        return 1800.0;
      }
      return 0.0;

  - platform: template
    name: "أمبير المكيف (تقديري)"
    id: ac_current
    unit_of_measurement: "A"
    icon: "mdi:current-ac"
    accuracy_decimals: 1
    update_interval: 1s
    lambda: |-
      if (id(ac_voltage).state > 0) {
        return id(ac_power).state / id(ac_voltage).state;
      }
      return 0.0;

  - platform: total_daily_energy
    name: "استهلاك اليوم (تقديري)"
    id: ac_daily_energy
    power_id: ac_power
    icon: "mdi:calendar-today"
    filters:
      - multiply: 0.001
    unit_of_measurement: "kWh"
    
