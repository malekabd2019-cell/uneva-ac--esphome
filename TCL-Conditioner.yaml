  recovery_pass: mKSzmBdt7DAj
  ota_pass: 90cf525a594c8bb2cbf917bc2c2fa058
  api_key: lmUoWsWs1oqSfJqLFsA6PisHSx4Y1G+iu7V3PDIqpXk=
  uart_rx: GPIO3
  uart_tx: GPIO1
  receive_led: GPIO6
  transmit_led: GPIO4

esphome:
  name: ${device_name}
  friendly_name: ${humanly_name}

esp8266:
  board: esp01_1m

# 1. تعريف منفذ السيريال
uart:
  id: uart_bus
  rx_pin: ${uart_rx}
  tx_pin: ${uart_tx}
  baud_rate: 9600

# 2. التحديث اللاسلكي (OTA)
ota:
  - platform: esphome
    password: ${ota_pass}

# 3. إجبار واجهة الويب على إظهار كافة الكيانات المعرفة
web_server:
  port: 80
  version: 2

# 4. الحزمة الأساسية للمكيف
packages:
  remote_package:
    url: https://github.com/sorz2122/tclac.git
    ref: master
    files:
      - packages/core.yaml
    refresh: 30s

# 5. وضع المولد المبرمج بشرائح الـ 38 بايت والـ Checksum
select:
  - platform: template
    name: "وضع المولد (Generator)"
    id: generator_mode_select
    icon: "mdi:generator-portable"
    options:
      - "Off"
      - "Level 1"
      - "Level 2"
      - "Level 3"
    initial_option: "Off"
    optimistic: true
    set_action:
      - lambda: |-
          uint8_t genLevel = 0;
          if (x == "Level 1") genLevel = 1;
          else if (x == "Level 2") genLevel = 2;
          else if (x == "Level 3") genLevel = 3;

          // بناء حزمة الـ 38 بايت
          uint8_t dataTX[38] = {0};
          dataTX[0] = 0xBB;
          dataTX[1] = 0x00;
          dataTX[2] = 0x01;
          dataTX[3] = 0x03;
          dataTX[4] = 0x20;
          dataTX[5] = 0x03;
          dataTX[6] = 0x01;
          dataTX[7] = 0x64;
          dataTX[8] = 0x03;
          dataTX[9] = 31 - 20;
          dataTX[10] = 0x00;
          dataTX[13] = 0x01;

          // الخانة 18 لمستوى المولد
          dataTX[18] = genLevel;

          // حساب XOR Checksum
          uint8_t crc = 0;
          for (int i = 0; i < 37; i++) {
            crc ^= dataTX[i];
          }
          dataTX[37] = crc;

          // إرسال الحزمة
          id(uart_bus).write_array(dataTX, 38);
          
