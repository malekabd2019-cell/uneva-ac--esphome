  uart_rx: GPIO16
  uart_tx: GPIO17
  receive_led: GPIO6
  transmit_led: GPIO4

esphome:
  name: ${device_name}
  friendly_name: ${humanly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

# 1. إعداد السيريال
uart:
  id: uart_bus
  rx_pin: ${uart_rx}
  tx_pin: ${uart_tx}
  baud_rate: 9600

# 2. التحديث اللاسلكي
ota:
  - platform: esphome
    password: ${ota_pass}

# 3. الحزمة الأساسية للمكيف
packages:
  remote_package:
    url: https://github.com/sorz2122/tclac.git
    ref: master
    files:
      - packages/core.yaml
    refresh: 30s

# 4. قائمة وضع المولد المحدثة (تستخرج الحرارة ديناميكياً بدون الاعتماد على ID)
select:
  - platform: template
    name: "وضع المولد (Generator)"
    id: generator_mode_select
    icon: "mdi:generator-portable"
    options:
      - "Off"
      - "Level 1"
      - "Level 2"
      - "Level 3"
    initial_option: "Off"
    optimistic: true
    set_action:
      - lambda: |-
          uint8_t genLevel = 0;
          if (x == "Level 1") genLevel = 1;
          else if (x == "Level 2") genLevel = 2;
          else if (x == "Level 3") genLevel = 3;

          // قراءة درجة الحرارة الحالية المحددة في واجهة المكيف مباشرة
          uint8_t currentTemp = 24; // قيمة افتراضية احتياطية
          if (!App.get_climates().empty()) {
            auto *ac = App.get_climates()[0];
            if (!std::isnan(ac->target_temperature)) {
              currentTemp = (uint8_t) ac->target_temperature;
            }
          }
          if (currentTemp < 16) currentTemp = 16;
          if (currentTemp > 30) currentTemp = 30;

          // بناء حزمة الـ 38 بايت
          uint8_t dataTX[38] = {0};
          dataTX[0] = 0xBB;
          dataTX[1] = 0x00;
          dataTX[2] = 0x01;
          dataTX[3] = 0x03;
          dataTX[4] = 0x20;
          dataTX[5] = 0x03;
          dataTX[6] = 0x01;
          dataTX[7] = 0x64;
          dataTX[8] = 0x03;
          
          // الخانة 9: الحرارة الديناميكية (31 - الحرارة الحالية)
          dataTX[9] = 31 - currentTemp;
          
          dataTX[10] = 0x00;
          dataTX[13] = 0x01;

          // الخانة 18: مستوى المولد
          dataTX[18] = genLevel;

          // حساب الـ XOR Checksum
          uint8_t crc = 0;
          for (int i = 0; i < 37; i++) {
            crc ^= dataTX[i];
          }
          dataTX[37] = crc;

          // إرسال الحزمة عبر السيريال
          id(uart_bus).write_array(dataTX, 38);
          
