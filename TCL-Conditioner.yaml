  transmit_led: GPIO4

# قسم ESPHome الأساسي
esphome:
  name: ${device_name}
  friendly_name: ${humanly_name}

# استدعاء الحزمة الأصلية من جيت هاب
packages:
  remote_package:
    url: https://github.com/I-am-nightingale/tclac.git
    ref: master
    files:
      - packages/core.yaml
    refresh: 0s

# مواصفات المتحكم
esp32:
  board: esp32dev
  framework:
    type: arduino

# واجهة الويب
web_server:
  port: 80

# إعدادات منفذ الاتصال UART
uart:
  id: tcl_uart
  tx_pin: ${uart_tx}
  rx_pin: ${uart_rx}
  baud_rate: 9600

# ==========================================
# قائمة اختيار وضع المولد (Gen Mode) المصححة
# ==========================================
select:
  - platform: template
    name: "وضع المولد (Gen Mode)"
    id: gen_mode_selector
    icon: "mdi:generator-portable"
    entity_category: config
    options:
      - "إيقاف (Off)"
      - "المستوى 1 (L1 - 2A)"
      - "المستوى 2 (L2 - 4A)"
      - "المستوى 3 (L3 - 5A)"
    optimistic: true
    set_action:
      then:
        - lambda: |-
            uint8_t gen_val = 0x00;
            if (x == "المستوى 1 (L1 - 2A)") {
              gen_val = 0x43;
            } else if (x == "المستوى 2 (L2 - 4A)") {
              gen_val = 0x49;
            } else if (x == "المستوى 3 (L3 - 5A)") {
              gen_val = 0x4D;
            }

            // بناء حزمة TCL المعيارية (38 بايت)
            uint8_t cmd[38] = {
              0xBB, 0x00, 0x01, 0x03, 0x20, 0x03, 0x01, 0x64,
              0x03, 0x08, 0x00, 0x00, 0x00, 0x01, 0x00, 0x00,
              0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
              0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
              0x0D, 0x08, gen_val, 0x00, 0x00, 0x00
            };

            // حساب الـ Checksum الصحيح لبروتوكول TCL
            uint8_t sum = 0;
            for (int i = 0; i < 37; i++) {
              sum += cmd[i];
            }
            cmd[37] = sum;

            // إرسال الحزمة مرتين متتاليتين للتغلب على تضارب البث الدوري
            id(tcl_uart).write_array(cmd, 38);
            delay(50);
            id(tcl_uart).write_array(cmd, 38);
            
