substitutions:
  device_name: tclac
  humanly_name: TCL Air Conditioner
  wifi_ssid: "TOTOLINK ND300"
  wifi_password: "A777763945A"
  recovery_pass: mKSzmBdt7DAj
  ota_pass: 90cf525a594c8bb2cbf917bc2c2fa058
  api_key: lmUoWsWs1oqSfJqLFsA6PisHSx4Y1G+iu7V3PDIqpXk=
  uart_rx: GPIO16
  uart_tx: GPIO17
  receive_led: GPIO6
  transmit_led: GPIO4

esphome:
  name: ${device_name}
  friendly_name: ${humanly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

# 1. إعداد السيريال القياسي
uart:
  id: uart_bus
  rx_pin: ${uart_rx}
  tx_pin: ${uart_tx}
  baud_rate: 9600

# 2. التحديث اللاسلكي وخادم الويب المباشر
ota:
  - platform: esphome
    password: ${ota_pass}

web_server:
  port: 80

# 3. مكون مزامنة الوقت
time:
  - platform: homeassistant
    id: homeassistant_time

# 4. الحزمة الأساسية للمكيف من مستودعك الصحيح
packages:
  remote_package:
    url: https://github.com/malekabd2019-cell/uneva-ac--esphome.git
    ref: main
    files:
      - packages/core.yaml
    refresh: 0s

# 5. زر وضع المولد المباشر
select:
  - platform: template
    name: "وضع المولد (Generator)"
    id: generator_mode_select
    icon: "mdi:generator-portable"
    options:
      - "Off"
      - "Level 1"
      - "Level 2"
      - "Level 3"
    initial_option: "Off"
    optimistic: true
    set_action:
      - lambda: |-
          uint8_t level = 0;
          if (x == "Level 1") level = 1;
          else if (x == "Level 2") level = 2;
          else if (x == "Level 3") level = 3;

          id(tclacclimate)->set_gen_mode(level);

# 6. الحساسات التقديرية (فولت، واط، أمبير، استهلاك اليوم)
sensor:
  - platform: template
    name: "فولتية الكهرباء (تقديري)"
    id: ac_voltage
    unit_of_measurement: "V"
    icon: "mdi:flash-outline"
    accuracy_decimals: 0
    lambda: |-
      return 220.0;

  - platform: template
    name: "قدرة المكيف (تقديري)"
    id: ac_power
    unit_of_measurement: "W"
    icon: "mdi:gauge"
    accuracy_decimals: 0
    update_interval: 1s
    lambda: |-
      if (id(tclacclimate)->mode == climate::CLIMATE_MODE_OFF) {
        return 5.0; 
      }
      
      std::string genState = id(generator_mode_select)->state;
      if (genState == "Level 1") return 700.0;
      if (genState == "Level 2") return 1100.0;
      if (genState == "Level 3") return 1400.0;
      
      return 1800.0;

  - platform: template
    name: "أمبير المكيف (تقديري)"
    id: ac_current
    unit_of_measurement: "A"
    icon: "mdi:current-ac"
    accuracy_decimals: 1
    update_interval: 1s
    lambda: |-
      if (id(ac_voltage)->state > 0) {
        return id(ac_power)->state / id(ac_voltage)->state;
      }
      return 0.0;

  - platform: total_daily_energy
    name: "استهلاك اليوم (تقديري)"
    id: ac_daily_energy
    power_id: ac_power
    icon: "mdi:calendar-today"
    filters:
      - multiply: 0.001
    unit_of_measurement: "kWh"
    
