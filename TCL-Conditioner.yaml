  board: esp32dev
  framework:
    type: arduino

# واجهة الويب للتحديث اللاسلكي
web_server:
  port: 80

# إعدادات الـ UART
uart:
  id: tcl_uart

# ==========================================
# قائمة اختيار وضع المولد الرسمية والمضمونة
# ==========================================
select:
  - platform: template
    name: "وضع المولد (Gen Mode)"
    id: gen_mode_selector
    icon: "mdi:generator-portable"
    options:
      - "إيقاف (Off)"
      - "المستوى 1 (L1 - 2A)"
      - "المستوى 2 (L2 - 4A)"
      - "المستوى 3 (L3 - 5A)"
    optimistic: true
    set_action:
      then:
        - lambda: |-
            // مصفوفة الأمر الأساسية المعتمدة والمطابقة للمشروع
            uint8_t cmd[38] = {
              0xBB, 0x00, 0x01, 0x03, 0x20, 0x03, 0x01, 0x64, 
              0x03, 0x08, 0x00, 0x00, 0x00, 0x01, 0x00, 0x00, 
              0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 
              0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 
              0x0D, 0x15, 0x00, 0x00, 0x00, 0x00
            };

            // حقن القيم الرسمية للمولد في الخانة الصحيحة (index 14)
            if (x == "إيقاف (Off)") {
              cmd[14] = 0x00;
              ESP_LOGI("GEN_MODE", "إرسال: إيقاف المولد");
            } else if (x == "المستوى 1 (L1 - 2A)") {
              cmd[14] = 0x01;
              ESP_LOGI("GEN_MODE", "إرسال: مستوى 2 أمبير الفعلي");
            } else if (x == "المستوى 2 (L2 - 4A)") {
              cmd[14] = 0x02;
              ESP_LOGI("GEN_MODE", "إرسال: مستوى 4 أمبير الفعلي");
            } else if (x == "المستوى 3 (L3 - 5A)") {
              cmd[14] = 0x03;
              ESP_LOGI("GEN_MODE", "إرسال: مستوى 5 أمبير الفعلي");
            }

            // حساب الـ Checksum التلقائي والمضمون للمكيف
            uint8_t sum = 0;
            for (int i = 0; i < 37; i++) {
              sum += cmd[i];
            }
            cmd[37] = 0x62 - sum;

            // إرسال الحزمة فوراً عبر السلك
            id(tcl_uart).write_array(cmd, 38);
            
