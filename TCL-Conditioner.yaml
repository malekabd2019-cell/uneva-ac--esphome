  uart_rx: GPIO16
  uart_tx: GPIO17
  receive_led: GPIO6
  transmit_led: GPIO4

# ملفات المستودع الخارجي
packages:
  remote_package:
    url: https://github.com/I-am-nightingale/tclac.git
    ref: master
    files:
      - packages/core.yaml
    refresh: 0s

# مواصفات المتحكم
esp32:
  board: esp32dev
  framework:
    type: arduino

# واجهة الويب للتحديث اللاسلكي
web_server:
  port: 80

# إعدادات الـ UART
uart:
  id: tcl_uart

# ==========================================
# قائمة اختيار وضع المولد بأكواد صريحة ومضمونة للبناء
# ==========================================
select:
  - platform: template
    name: "وضع المولد (Gen Mode)"
    id: gen_mode_selector
    icon: "mdi:generator-portable"
    options:
      - "إيقاف (Off)"
      - "المستوى 1 (L1 - 2A)"
      - "المستوى 2 (L2 - 4A)"
      - "المستوى 3 (L3 - 5A)"
    optimistic: true
    set_action:
      then:
        - lambda: |-
            if (x == "إيقاف (Off)") {
              ESP_LOGI("GEN_MODE", "إرسال شفرة: إيقاف المولد");
              uint8_t cmd[38] = {0xBB, 0x00, 0x01, 0x03, 0x20, 0x03, 0x01, 0x64, 0x03, 0x08, 0x00, 0x00, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x0D, 0x15, 0x41, 0x00, 0x00, 0xAC};
              id(tcl_uart).write_array(cmd, 38);
            } else if (x == "المستوى 1 (L1 - 2A)") {
              ESP_LOGI("GEN_MODE", "إرسال شفرة: مستوى 2 أمبير");
              uint8_t cmd[38] = {0xBB, 0x00, 0x01, 0x03, 0x20, 0x03, 0x01, 0x64, 0x03, 0x08, 0x00, 0x00, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x0D, 0x15, 0x43, 0x00, 0x00, 0xAA};
              id(tcl_uart).write_array(cmd, 38);
            } else if (x == "المستوى 2 (L2 - 4A)") {
              ESP_LOGI("GEN_MODE", "إرسال شفرة: مستوى 4 أمبير");
              uint8_t cmd[38] = {0xBB, 0x00, 0x01, 0x03, 0x20, 0x03, 0x01, 0x64, 0x03, 0x08, 0x00, 0x00, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x0D, 0x15, 0x49, 0x00, 0x00, 0xA4};
              id(tcl_uart).write_array(cmd, 38);
            } else if (x == "المستوى 3 (L3 - 5A)") {
              ESP_LOGI("GEN_MODE", "إرسال شفرة: مستوى 5 أمبير");
              uint8_t cmd[38] = {0xBB, 0x00, 0x01, 0x03, 0x20, 0x03, 0x01, 0x64, 0x03, 0x08, 0x00, 0x00, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x0D, 0x15, 0x4D, 0x00, 0x00, 0xA0};
              id(tcl_uart).write_array(cmd, 38);
            }
            
