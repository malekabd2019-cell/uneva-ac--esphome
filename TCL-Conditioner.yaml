esphome:
  name: uneva-ac
  friendly_name: Uneva Air Conditioner

esp32:
  board: esp32dev
  framework:
    type: arduino

# 1. Fetch the custom TCL/Uneva AC component
external_components:
  - source:
      type: git
      url: https://github.com/malekabd2019-cell/TCL-Conditioner

# 2. WiFi Configuration
wifi:
  ssid: "TOTOLINK ND300"
  password: "A777763945A"
  
  # Fallback Hotspot
  ap:
    ssid: "Uneva AC Fallback AP"
    password: "BackupPassword123"

# 3. Enable Home Assistant Native API & OTA
api:
ota:
  - platform: esphome

# Enable logging
logger:

# 4. UART Communication settings
uart:
  id: ac_uart
  tx_pin: GPIO17 
  rx_pin: GPIO16 
  baud_rate: 9600

# 5. Define the Climate Device
climate:
  - platform: tclac
    name: "Uneva AC"
    uart_id: ac_uart
    
