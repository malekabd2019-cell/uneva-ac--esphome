substitutions:
  # يجب استخدام الشرطة السفلية _ لكي تقبلها معرفات الـ ID
  device_name: uneva_ac
  # الاسم المفهوم للشاشة
  humanly_name: Uneva Air Conditioner
  # إعدادات الواي فاي
  wifi_ssid: "TOTOLINK ND300"
  wifi_password: "A777763945A"
  # كلمة السر والمفاتيح
  recovery_pass: mKSzmBdt7DAj
  ota_pass: 90cf525a594c8bb2cbf917bc2c2fa058
  api_key: lmUoWsWs1oqSfJqLFsA6PisHSx4Y1G+iu7V3PDIqpXk=
  # المنافذ
  uart_rx: GPIO16
  uart_tx: GPIO17
  receive_led: GPIO6
  transmit_led: GPIO4

# قسم ESPHome الأساسي
esphome:
  name: ${device_name}
  friendly_name: ${humanly_name}

# استدعاء الحزمة الأصلية
packages:
  remote_package:
    url: https://github.com/I-am-nightingale/tclac.git
    ref: master
    files:
      - packages/core.yaml
    refresh: 0s

# مواصفات المتحكم
esp32:
  board: esp32dev
  framework:
    type: arduino

# واجهة الويب للتحديث اللاسلكي
web_server:
  port: 80

# إعدادات منفذ الاتصال UART
uart:
  id: tcl_uart
  tx_pin: ${uart_tx}
  rx_pin: ${uart_rx}
  baud_rate: 9600

# ==========================================
# قائمة اختيار وضع المولد (Gen Mode)
# ==========================================
select:
  - platform: template
    name: "وضع المولد (Gen Mode)"
    id: gen_mode_selector
    icon: "mdi:generator-portable"
    entity_category: config
    options:
      - "إيقاف (Off)"
      - "المستوى 1 (L1 - 2A)"
      - "المستوى 2 (L2 - 4A)"
      - "المستوى 3 (L3 - 5A)"
    optimistic: true
    set_action:
      then:
        - lambda: |-
            if (x == "إيقاف (Off)") {
              id(${device_name}climate).set_gen_mode(0x00);
            } else if (x == "المستوى 1 (L1 - 2A)") {
              id(${device_name}climate).set_gen_mode(0x43);
            } else if (x == "المستوى 2 (L2 - 4A)") {
              id(${device_name}climate).set_gen_mode(0x49);
            } else if (x == "المستوى 3 (L3 - 5A)") {
              id(${device_name}climate).set_gen_mode(0x4D);
            }
            
