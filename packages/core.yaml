      - "–î–æ —É–ø–æ—Ä–∞ –≤–ª–µ–≤–æ"
      - "–í –ª–µ–≤–æ–π –ø–æ–ª–æ–≤–∏–Ω–µ"
      - "–ü–æ —Å–µ—Ä–µ–¥–∏–Ω–µ"
      - "–í –ø—Ä–∞–≤–æ–π –ø–æ–ª–æ–≤–∏–Ω–µ"
      - "–î–æ —É–ø–æ—Ä–∞ –≤–ø—Ä–∞–≤–æ"
    optimistic: true
